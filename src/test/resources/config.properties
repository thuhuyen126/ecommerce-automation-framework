# =============================================================
# E-Commerce Automation Framework - Configuration
# =============================================================

# Application URL
base.url=https://www.saucedemo.com

# Browser (chrome | edge | firefox)
browser=chrome

# Headless mode (true | false)
headless=false

# Wait timeouts (seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Test credentials
valid.username=standard_user
valid.password=secret_sauce
locked.username=locked_out_user
locked.password=secret_sauce
invalid.username=invalid_user
invalid.password=wrong_password

# Environment (qa | uat | prod)
env=qa

# Reports
report.path=reports/
screenshot.path=screenshots/
report.name=E-Commerce Automation Report
